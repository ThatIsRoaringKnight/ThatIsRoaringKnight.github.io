<!DOCTYPE html>
<html>
<head>
<style>
 table {
   width: 500px;
   margin: auto;
   background-color:rgb(155,15,5);
   color:rgb(255,25,15);
   border-collapse: collapse;
 }

 td, th {
   padding: 10px;
   border: 1px solid white;
 }

 tr.lighter {
   font-size: 20px;
   background-color:rgb(100,35,35);
 }
</style>
</head>

<body>

<table>
 <tr>
   <th colspan="2">Lucian's Schedule</th>
 </tr>

 <tr>
   <td>Time</td>
   <td>Activity</td>
 </tr>

 <tr class="lighter">
   <td>8am</td>
   <td>Wake up</td>
 </tr>

 <tr class="lighter">
   <td>9am</td>
   <td>Work with Mrs. Renton</td>
 </tr>

 <tr class="lighter">
   <td>10am</td>
   <td>Go Home</td>
 </tr>

 <tr class="lighter">
   <td>11am</td>
   <td>Do Homework</td>
 </tr>
</table>

</body>
</html>
